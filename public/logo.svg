<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b2a"/>
      <stop offset="100%" stop-color="#09071f"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow2" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#8B5CF6" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Inner background glow -->
  <circle cx="50" cy="58" r="35" fill="#8B5CF6" fill-opacity="0.07"/>

  <!-- Growth chart line (bottom-left to top-right, zigzag upward trend) -->
  <!-- Points: (20,72) -> (37,55) -> (50,62) -> (65,38) -> (80,22) -->
  <polyline
    filter="url(#glow)"
    points="20,72 37,55 50,62 65,38 80,22"
    stroke="url(#line)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Arrow head at the top-right -->
  <polyline
    points="68,16 80,22 74,32"
    stroke="url(#line)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Glowing nodes at key points -->
  <!-- Node 1 (start) -->
  <circle cx="20" cy="72" r="4.5" fill="#8B5CF6" filter="url(#glow2)"/>
  <circle cx="20" cy="72" r="3" fill="#a78bfa"/>

  <!-- Node 2 -->
  <circle cx="37" cy="55" r="4.5" fill="#8B5CF6" filter="url(#glow2)"/>
  <circle cx="37" cy="55" r="3" fill="#a78bfa"/>

  <!-- Node 3 (dip) -->
  <circle cx="50" cy="62" r="4.5" fill="#7C3AED" filter="url(#glow2)"/>
  <circle cx="50" cy="62" r="3" fill="#8B5CF6"/>

  <!-- Node 4 (peak) -->
  <circle cx="65" cy="38" r="4.5" fill="#6D28D9" filter="url(#glow2)"/>
  <circle cx="65" cy="38" r="3" fill="#8B5CF6"/>
</svg>
