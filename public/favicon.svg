<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0b2a"/>
      <stop offset="100%" stop-color="#09071f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#8B5CF6" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Growth line -->
  <polyline points="6,23 11,17 16,20 21,12 26,7" stroke="url(#line)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow -->
  <polyline points="22,5 26,7 24,11" stroke="url(#line)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Nodes -->
  <circle cx="6" cy="23" r="2" fill="#8B5CF6" opacity="0.9"/>
  <circle cx="11" cy="17" r="2" fill="#9333EA" opacity="0.9"/>
  <circle cx="16" cy="20" r="2" fill="#7C3AED" opacity="0.9"/>
  <circle cx="21" cy="12" r="2" fill="#6D28D9" opacity="0.9"/>
</svg>
